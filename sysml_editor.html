<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SysML BDD/IBD Editor</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --canvas-bg: #2d2d2d;
            --border-color: #555;
            --text-color: #e0e0e0;
            --accent-color: #007acc;
            --selected-color: #ff9900;
            --danger-color: #ff3333;
            --port-color: #4caf50;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            touch-action: none; /* Block default device zooming/scrolling */
        }

        /* Fixed Global Icon Toolbar */
        #toolbar {
            height: 45px;
            background-color: #111;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid var(--border-color);
            gap: 8px;
            box-sizing: border-box;
        }

        #toolbar h1 {
            font-size: 14px;
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-right: 10px;
            color: #aaa;
        }

        #diagram-tag {
            background-color: var(--accent-color);
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            margin-right: auto;
            text-transform: uppercase;
        }

        .tool-btn {
            background-color: #2d2d2d;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            width: 34px;
            height: 34px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .tool-btn:hover {
            background-color: #404040;
        }

        .tool-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        #btn-delete:hover:not(:disabled) {
            background-color: var(--danger-color);
            border-color: var(--danger-color);
            color: #fff;
        }

        #canvas {
            width: 100vw;
            height: calc(100vh - 45px);
            background-color: var(--canvas-bg);
            background-image: 
                linear-gradient(to right, #3a3a3a 1px, transparent 1px),
                linear-gradient(to bottom, #3a3a3a 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
            overflow: hidden;
        }

        /* Block Styling */
        .block {
            position: absolute;
            background-color: #252526;
            border: 2px solid var(--text-color);
            color: var(--text-color);
            box-sizing: border-box;
            cursor: move;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 8px;
            border-radius: 3px;
            z-index: 2;
        }

        .block .stereotype {
            font-size: 10px;
            color: #888;
            font-style: italic;
            pointer-events: none;
        }

        .block .text {
            font-size: 13px;
            font-weight: bold;
            margin-top: 6px;
            text-align: center;
            width: 100%;
            word-break: break-all;
            outline: none;
            pointer-events: none;
        }

        /* Selection Borders */
        .block.selected {
            border: 2px dashed var(--selected-color);
        }

        /* Border Ports */
        .port {
            width: 14px;
            height: 14px;
            background-color: var(--port-color);
            position: absolute;
            border: 1px solid #fff;
            cursor: pointer;
            z-index: 10;
            box-sizing: border-box;
            border-radius: 2px;
        }

        .port.selected {
            background-color: var(--selected-color);
            box-shadow: 0 0 6px var(--selected-color);
        }

        /* SVG Rendering Layer */
        #svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .connection-wrapper {
            cursor: pointer;
            pointer-events: visibleStroke;
        }

        .connection-bg-line {
            stroke: transparent;
            stroke-width: 14;
            fill: none;
        }

        .connection-line {
            stroke: var(--text-color);
            stroke-width: 2;
            fill: none;
            transition: stroke 0.1s;
        }

        .connection-wrapper:hover .connection-line {
            stroke: #aaa;
        }

        .connection-wrapper.selected .connection-line {
            stroke: var(--selected-color);
            stroke-dasharray: 4;
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <h1 id="title-mode">SysML</h1>
        <div id="diagram-tag">BDD Mode</div>
        <button id="btn-view" class="tool-btn" title="Toggle BDD / IBD Mode">⇄</button>
        <button id="btn-undo" class="tool-btn" title="Undo">↶</button>
        <button id="btn-delete" class="tool-btn" title="Delete">🗑</button>
        <button id="btn-grow" class="tool-btn" title="Increase Size" disabled>＋</button>
        <button id="btn-shrink" class="tool-btn" title="Decrease Size" disabled>－</button>
    </div>
    
    <div id="canvas">
        <svg id="svg-layer"></svg>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const svgLayer = document.getElementById('svg-layer');
        const diagramTag = document.getElementById('diagram-tag');
        const btnView = document.getElementById('btn-view');
        const btnUndo = document.getElementById('btn-undo');
        const btnDelete = document.getElementById('btn-delete');
        const btnGrow = document.getElementById('btn-grow');
        const btnShrink = document.getElementById('btn-shrink');
        
        let selectedType = null; 
        let selectedId = null;
        
        let isDragging = false;
        let dragTargetId = null;
        let dragStartX, dragStartY;
        
        let blockCounter = 0;
        let portCounter = 0;
        let connCounter = 0;

        let blocks = {};
        let ports = {};
        let connections = {};
        let currentMode = 'bdd'; // 'bdd' or 'ibd'

        const historyStack = [];
        const STORAGE_KEY = 'sysml_hybrid_diagram_state';

        // --- Core Application Events ---
        canvas.addEventListener('click', onCanvasClick);
        canvas.addEventListener('dblclick', toggleDiagramMode);
        btnView.addEventListener('click', toggleDiagramMode);
        
        // Desktop Pointer Listeners
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
        
        // Mobile Touch Engine Bindings
        document.addEventListener('touchmove', onTouchMove, { passive: false });
        document.addEventListener('touchend', onMouseUp);

        btnDelete.addEventListener('click', deleteSelected);
        btnUndo.addEventListener('click', popHistory);
        btnGrow.addEventListener('click', () => resizeBlock(20, 15));
        btnShrink.addEventListener('click', () => resizeBlock(-20, -15));

        window.addEventListener('DOMContentLoaded', loadFromStorage);

        function toggleDiagramMode() {
            checkpointAction();
            currentMode = (currentMode === 'bdd') ? 'ibd' : 'bdd';
            diagramTag.innerText = `${currentMode} Mode`;
            diagramTag.style.backgroundColor = (currentMode === 'bdd') ? '#007acc' : '#8a2be2';
            
            // Re-render stereotype values across live tracking blocks
            for(let id in blocks) {
                const blockEl = document.getElementById(id);
                if(blockEl) {
                    const stEl = blockEl.querySelector('.stereotype');
                    if(stEl) stEl.innerText = (currentMode === 'bdd') ? '«block»' : '«part»';
                }
            }
            saveState();
        }

        // --- Storage Infrastructure ---
        function serializeState() {
            const state = {
                blockCounter, portCounter, connCounter, currentMode,
                blocks, ports, connections: {}
            };
            for (let id in connections) {
                state.connections[id] = {
                    id: connections[id].id,
                    from: connections[id].from,
                    to: connections[id].to
                };
            }
            return state;
        }

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(serializeState()));
        }

        function checkpointAction() {
            historyStack.push(JSON.parse(JSON.stringify(serializeState())));
            btnUndo.disabled = false;
            saveState();
        }

        function loadFromStorage() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (!stored) { btnUndo.disabled = true; return; }
            
            const stateObj = JSON.parse(stored);
            currentMode = stateObj.currentMode || 'bdd';
            diagramTag.innerText = `${currentMode} Mode`;
            diagramTag.style.backgroundColor = (currentMode === 'bdd') ? '#007acc' : '#8a2be2';
            
            renderFromStateObject(stateObj);
            btnUndo.disabled = historyStack.length === 0;
        }

        function popHistory() {
            if (historyStack.length === 0) return;
            renderFromStateObject(historyStack.pop());
            saveState();
            if (historyStack.length === 0) btnUndo.disabled = true;
        }

        function renderFromStateObject(stateObj) {
            clearSelection();
            canvas.querySelectorAll('.block').forEach(b => b.remove());
            svgLayer.innerHTML = '';

            blockCounter = stateObj.blockCounter || 0;
            portCounter = stateObj.portCounter || 0;
            connCounter = stateObj.connCounter || 0;
            ports = stateObj.ports || {};
            blocks = stateObj.blocks || {};
            connections = {};

            for (let bId in blocks) {
                const bData = blocks[bId];
                const block = document.createElement('div');
                block.className = 'block';
                block.id = bId;
                block.style.left = bData.left;
                block.style.top = bData.top;
                block.style.width = bData.width || '130px';
                block.style.height = bData.height || '80px';
                
                const label = (currentMode === 'bdd') ? '«block»' : '«part»';
                block.innerHTML = `<div class="stereotype">${label}</div><div class="text">${bData.text}</div>`;
                
                // Polyfilled execution bindings
                block.addEventListener('mousedown', (e) => onBlockStart(e, bId, e.clientX, e.clientY));
                block.addEventListener('touchstart', (e) => {
                    const t = e.touches[0];
                    onBlockStart(e, bId, t.clientX, t.clientY);
                }, {passive: false});

                block.addEventListener('click', (e) => onBlockClick(e, bId));
                canvas.appendChild(block);
                
                bData.ports.forEach(pId => {
                    const pData = ports[pId];
                    const port = document.createElement('div');
                    port.className = 'port';
                    port.id = pId;
                    port.style.left = `calc(${pData.pctX}% - 7px)`;
                    port.style.top = `calc(${pData.pctY}% - 7px)`;
                    port.addEventListener('click', (e) => onPortClick(e, pId));
                    block.appendChild(port);
                });
            }

            for (let cId in stateObj.connections) {
                const cData = stateObj.connections[cId];
                buildConnectionUI(cData.id, cData.from, cData.to);
            }
            updateConnections();
        }

        // --- Interaction Routing Logic ---

        function onCanvasClick(e) {
            if (e.target === canvas || e.target === svgLayer) {
                if (selectedId || selectedType) {
                    clearSelection();
                } else {
                    checkpointAction();
                    createBlock(e.clientX, e.clientY - 45);
                }
            }
        }

        function createBlock(x, y) {
            const id = 'block_' + blockCounter++;
            const block = document.createElement('div');
            block.className = 'block';
            block.id = id;
            block.style.left = (x - 65) + 'px';
            block.style.top = (y - 40) + 'px';
            block.style.width = '130px';
            block.style.height = '80px';

            const label = (currentMode === 'bdd') ? '«block»' : '«part»';
            block.innerHTML = `<div class="stereotype">${label}</div><div class="text">Block_${blockCounter}</div>`;

            blocks[id] = { 
                left: block.style.left, top: block.style.top, 
                width: block.style.width, height: block.style.height,
                text: `Block_${blockCounter}`, ports: [] 
            };

            block.addEventListener('mousedown', (e) => onBlockStart(e, id, e.clientX, e.clientY));
            block.addEventListener('touchstart', (e) => {
                const t = e.touches[0];
                onBlockStart(e, id, t.clientX, t.clientY);
            }, {passive: false});

            block.addEventListener('click', (e) => onBlockClick(e, id));
            
            canvas.appendChild(block);
            setSelection('block', id);
            saveState();
        }

        function onBlockClick(e, id) {
            e.stopPropagation();
            if (selectedType === 'port') return;

            const blockEl = document.getElementById(id);
            const textEl = blockEl.querySelector('.text');

            if (selectedId === id && selectedType === 'block') {
                textEl.style.pointerEvents = 'auto';
                textEl.contentEditable = "true";
                textEl.focus();
                document.execCommand('selectAll', false, null);
                
                textEl.addEventListener('blur', () => {
                    if(blocks[id].text !== textEl.innerText) {
                        checkpointAction();
                        blocks[id].text = textEl.innerText;
                    }
                    textEl.contentEditable = "false";
                    textEl.style.pointerEvents = 'none';
                }, { once: true });
            } else {
                setSelection('block', id);
            }
        }

        function onBlockStart(e, id, clientX, clientY) {
            if (e.target.contentEditable === "true" || e.target.classList.contains('port')) return;
            
            const blockEl = document.getElementById(id);
            const rect = blockEl.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            const borderThresh = 12; 

            // Handle frame edge interactions
            if (x <= borderThresh || x >= rect.width - borderThresh || y <= borderThresh || y >= rect.height - borderThresh) {
                e.stopPropagation();
                e.preventDefault();
                
                const OVERLAP_RADIUS = 16; 
                let matchedPortId = null;

                for (let pId of blocks[id].ports) {
                    const portEl = document.getElementById(pId);
                    if (!portEl) continue;
                    const distance = Math.hypot(x - (portEl.offsetLeft + 7), y - (portEl.offsetTop + 7));
                    if (distance <= OVERLAP_RADIUS) { matchedPortId = pId; break; }
                }

                if (matchedPortId) {
                    onPortClick(null, matchedPortId);
                } else {
                    checkpointAction();
                    createPort(id, x, y, rect.width, rect.height);
                }
                return;
            }

            // Lock structural dragging pipeline
            isDragging = true;
            dragTargetId = id;
            dragStartX = clientX - parseInt(blockEl.style.left);
            dragStartY = clientY - parseInt(blockEl.style.top);
            
            if (selectedType !== 'port' && selectedId !== id) {
                setSelection('block', id);
            }
            e.stopPropagation();
        }

        function createPort(blockId, x, y, w, h) {
            const portId = 'port_' + portCounter++;
            const port = document.createElement('div');
            port.className = 'port';
            port.id = portId;

            const distLeft = x; const distRight = w - x;
            const distTop = y; const distBottom = h - y;
            const minDist = Math.min(distLeft, distRight, distTop, distBottom);

            let pctX = 50, pctY = 50, edge = 'top';
            if (minDist === distLeft) { pctX = 0; pctY = (y / h) * 100; edge = 'left'; }
            else if (minDist === distRight) { pctX = 100; pctY = (y / h) * 100; edge = 'right'; }
            else if (minDist === distTop) { pctX = (x / w) * 100; pctY = 0; edge = 'top'; }
            else if (minDist === distBottom) { pctX = (x / w) * 100; pctY = 100; edge = 'bottom'; }

            port.style.left = `calc(${pctX}% - 7px)`;
            port.style.top = `calc(${pctY}% - 7px)`;
            port.addEventListener('click', (e) => onPortClick(e, portId));

            document.getElementById(blockId).appendChild(port);
            blocks[blockId].ports.push(portId);

            ports[portId] = { blockId, pctX, pctY, edge };
            setSelection('port', portId);
            saveState();
        }

        function onPortClick(e, id) {
            if (e) e.stopPropagation();
            if (selectedType === 'port' && selectedId !== id) {
                checkpointAction();
                createConnection(selectedId, id);
                clearSelection();
            } else {
                setSelection('port', id);
            }
        }

        function createConnection(portId1, portId2) {
            if(portId1 === portId2) return;
            const id = 'conn_' + connCounter++;
            buildConnectionUI(id, portId1, portId2);
            updateConnections();
            saveState();
        }

        function buildConnectionUI(id, portId1, portId2) {
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('class', 'connection-wrapper');
            g.setAttribute('id', id);

            const bgLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            bgLine.setAttribute('class', 'connection-bg-line');
            
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            line.setAttribute('class', 'connection-line');

            g.appendChild(bgLine); g.appendChild(line);
            svgLayer.appendChild(g);

            connections[id] = { id, g, line, bgLine, from: portId1, to: portId2 };
            g.addEventListener('click', (e) => { e.stopPropagation(); setSelection('conn', id); });
        }

        function resizeBlock(dw, dh) {
            if (selectedType !== 'block' || !selectedId) return;
            checkpointAction();

            const el = document.getElementById(selectedId);
            const newW = Math.max(90, el.offsetWidth + dw);
            const newH = Math.max(60, el.offsetHeight + dh);

            el.style.width = newW + 'px'; el.style.height = newH + 'px';
            blocks[selectedId].width = el.style.width;
            blocks[selectedId].height = el.style.height;

            updateConnections();
            saveState();
        }

        function updateConnections() {
            for (let id in connections) {
                const conn = connections[id];
                const p1 = getPortAbsolutePos(conn.from);
                const p2 = getPortAbsolutePos(conn.to);
                
                const c1 = getControlPoint(p1.x, p1.y, ports[conn.from].edge, 45);
                const c2 = getControlPoint(p2.x, p2.y, ports[conn.to].edge, 45);

                const pathData = `M ${p1.x} ${p1.y} C ${c1.x} ${c1.y}, ${c2.x} ${c2.y}, ${p2.x} ${p2.y}`;
                conn.line.setAttribute('d', pathData);
                conn.bgLine.setAttribute('d', pathData);
            }
        }

        function getControlPoint(x, y, edge, dist) {
            if (edge === 'left') return { x: x - dist, y: y };
            if (edge === 'right') return { x: x + dist, y: y };
            if (edge === 'top') return { x: x, y: y - dist };
            if (edge === 'bottom') return { x: x, y: y + dist };
            return { x, y };
        }

        function getPortAbsolutePos(portId) {
            const portData = ports[portId];
            const blockEl = document.getElementById(portData.blockId);
            if(!blockEl) return { x: 0, y: 0 };
            return {
                x: parseInt(blockEl.style.left) + (blockEl.offsetWidth * (portData.pctX / 100)),
                y: parseInt(blockEl.style.top) + (blockEl.offsetHeight * (portData.pctY / 100))
            };
        }

        // --- Processing Engine Move Handlers ---
        function handleGlobalMove(clientX, clientY) {
            if (isDragging && dragTargetId) {
                const blockEl = document.getElementById(dragTargetId);
                let currentX = clientX - dragStartX;
                let currentY = clientY - dragStartY;

                currentX = Math.max(0, Math.min(currentX, canvas.clientWidth - blockEl.offsetWidth));
                currentY = Math.max(0, Math.min(currentY, canvas.clientHeight - blockEl.offsetHeight));

                blockEl.style.left = currentX + 'px';
                blockEl.style.top = currentY + 'px';
                
                blocks[dragTargetId].left = blockEl.style.left;
                blocks[dragTargetId].top = blockEl.style.top;
                updateConnections();
            }
        }

        function onMouseMove(e) { handleGlobalMove(e.clientX, e.clientY); }
        function onTouchMove(e) { 
            if(isDragging) {
                e.preventDefault(); // Lock viewport scrolling while dragging
                const t = e.touches[0];
                handleGlobalMove(t.clientX, t.clientY);
            }
        }

        function onMouseUp() {
            if (isDragging) { isDragging = false; dragTargetId = null; saveState(); }
        }

        // --- Selection Engine ---
        function setSelection(type, id) {
            clearSelection();
            selectedType = type; selectedId = id;
            if (type === 'block') {
                document.getElementById(id).classList.add('selected');
                btnGrow.disabled = false; btnShrink.disabled = false;
            }
            if (type === 'port') document.getElementById(id).classList.add('selected');
            if (type === 'conn') connections[id].g.classList.add('selected');
            btnDelete.disabled = false;
        }

        function clearSelection() {
            if (selectedType && selectedId) {
                const el = document.getElementById(selectedId);
                if (selectedType === 'block' && el) el.classList.remove('selected');
                if (selectedType === 'port' && el) el.classList.remove('selected');
                if (selectedType === 'conn' && connections[selectedId]) connections[selectedId].g.classList.remove('selected');
            }
            selectedType = null; selectedId = null;
            btnDelete.disabled = true; btnGrow.disabled = true; btnShrink.disabled = true;
        }

        // --- Deletion Sequences ---
        function deleteSelected() {
            if (!selectedType || !selectedId) return;
            checkpointAction();
            if (selectedType === 'block') deleteBlock(selectedId);
            if (selectedType === 'port') deletePort(selectedId);
            if (selectedType === 'conn') deleteConnection(selectedId);
            clearSelection();
            saveState();
        }

        function deleteBlock(id) {
            const portIds = [...blocks[id].ports];
            portIds.forEach(pId => deletePort(pId));
            const el = document.getElementById(id);
            if(el) el.remove();
            delete blocks[id];
        }

        function deletePort(id) {
            for (let cId in connections) {
                if (connections[cId].from === id || connections[cId].to === id) deleteConnection(cId);
            }
            const bId = ports[id].blockId;
            if (blocks[bId]) blocks[bId].ports = blocks[bId].ports.filter(p => p !== id);
            const portEl = document.getElementById(id);
            if (portEl) portEl.remove();
            delete ports[id];
        }

        function deleteConnection(id) {
            if (connections[id]) { connections[id].g.remove(); delete connections[id]; }
        }
    </script>
</body>
</html>
