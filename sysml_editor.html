<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SysML v2 Parallel Definition & Usage Modeler</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --canvas-bg: #2d2d2d;
            --border-color: #555;
            --text-color: #e0e0e0;
            --accent-def: #007acc;
            --accent-usage: #8a2be2;
            --selected-color: #ff9900;
            --danger-color: #ff3333;
            --port-color: #4caf50;
            --sidebar-width: 320px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        #app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        #import-panel {
            width: var(--sidebar-width);
            height: 100%;
            background-color: #1a1a1a;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            transition: margin-left 0.3s ease;
            z-index: 10;
        }

        #import-panel.collapsed {
            margin-left: calc(-1 * var(--sidebar-width));
        }

        .panel-header {
            padding: 12px;
            background-color: #111;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #txt-import-area {
            flex: 1;
            background-color: #252526;
            color: #a7dbf7;
            border: none;
            padding: 12px;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 12px;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        .panel-footer {
            padding: 10px;
            background-color: #111;
            border-top: 1px solid var(--border-color);
        }

        .primary-btn {
            width: 100%;
            background-color: var(--accent-def);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }

        .primary-btn:hover { background-color: #0062a3; }

        #workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        #toolbar {
            height: 45px;
            background-color: #111;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid var(--border-color);
            gap: 8px;
            box-sizing: border-box;
        }

        #toolbar h1 {
            font-size: 13px;
            margin: 0;
            font-weight: 600;
            color: #aaa;
            text-transform: uppercase;
        }

        #diagram-context {
            background-color: var(--accent-def);
            color: #fff;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 3px;
            font-weight: bold;
            margin-right: auto;
            text-transform: uppercase;
        }

        .tool-btn {
            background-color: #2d2d2d;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            width: 34px;
            height: 34px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tool-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        #btn-action-context { font-size: 11px; width: auto; padding: 0 10px; font-weight: bold; background-color: #333; }

        #canvas {
            flex: 1;
            background-color: var(--canvas-bg);
            background-image: 
                linear-gradient(to right, #3a3a3a 1px, transparent 1px),
                linear-gradient(to bottom, #3a3a3a 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
            overflow: hidden;
        }

        .block {
            position: absolute;
            background-color: #252526;
            border: 2px solid var(--text-color);
            color: var(--text-color);
            box-sizing: border-box;
            cursor: move;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 8px;
            border-radius: 3px;
            z-index: 2;
        }

        .block .stereotype { font-size: 10px; color: #888; font-style: italic; pointer-events: none; }
        .block .text { font-size: 13px; font-weight: bold; margin-top: 4px; text-align: center; width: 100%; word-break: break-all; outline: none; pointer-events: none; }
        .block.selected { border: 2px dashed var(--selected-color); }

        .port {
            width: 14px;
            height: 14px;
            background-color: var(--port-color);
            position: absolute;
            border: 1px solid #fff;
            cursor: pointer;
            z-index: 10;
            box-sizing: border-box;
            border-radius: 2px;
        }
        .port.selected { background-color: var(--selected-color); box-shadow: 0 0 6px var(--selected-color); }

        #svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .connection-wrapper { cursor: pointer; pointer-events: visibleStroke; }
        .connection-bg-line { stroke: transparent; stroke-width: 14; fill: none; }
        .connection-line { stroke: var(--text-color); stroke-width: 2; fill: none; }
        .connection-wrapper.selected .connection-line { stroke: var(--selected-color); stroke-dasharray: 4; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="import-panel">
            <div class="panel-header">
                <span>SysML v2 Script Panel</span>
                <button id="btn-toggle-panel" style="background:transparent; border:none; color:#aaa; cursor:pointer;">◀</button>
            </div>
            <textarea id="txt-import-area" placeholder="// Paste SysML v2 definitions here...&#10;part def FlightController;&#10;part def SensorCluster;&#10;part def PowerSubsystem;"></textarea>
            <div class="panel-footer">
                <button id="btn-compile" class="primary-btn">Compile to DefinitionView</button>
            </div>
        </div>

        <div id="workspace">
            <div id="toolbar">
                <button id="btn-open-panel" class="tool-btn" title="Open SysML v2 Script Editor" style="font-size:12px; width:auto; padding:0 8px;">📑 Script v2</button>
                <h1>SysML v2</h1>
                <div id="diagram-context">DefinitionView: Reusable Blueprints</div>
                <button id="btn-action-context" class="tool-btn" disabled>Open Usage View (part)</button>
                <button id="btn-undo" class="tool-btn" title="Undo Layout Action">↶</button>
                <button id="btn-delete" class="tool-btn" title="Delete Selection">🗑</button>
                <button id="btn-grow" class="tool-btn" title="Scale Up Node" disabled>＋</button>
                <button id="btn-shrink" class="tool-btn" title="Scale Down Node" disabled>－</button>
            </div>
            
            <div id="canvas">
                <svg id="svg-layer"></svg>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const svgLayer = document.getElementById('svg-layer');
        const diagramCtx = document.getElementById('diagram-context');
        const btnActionCtx = document.getElementById('btn-action-context');
        const btnUndo = document.getElementById('btn-undo');
        const btnDelete = document.getElementById('btn-delete');
        const btnGrow = document.getElementById('btn-grow');
        const btnShrink = document.getElementById('btn-shrink');
        
        const importPanel = document.getElementById('import-panel');
        const btnTogglePanel = document.getElementById('btn-toggle-panel');
        const btnOpenPanel = document.getElementById('btn-open-panel');
        const btnCompile = document.getElementById('btn-compile');
        const txtImportArea = document.getElementById('txt-import-area');

        let selectedType = null; 
        let selectedId = null;
        let isDragging = false;
        let dragTargetId = null;
        let dragStartX, dragStartY;

        let modelState = {
            currentView: 'DefinitionView', 
            definitions: { blockCounter: 0, portCounter: 0, connCounter: 0, blocks: {}, ports: {}, connections: {} },
            usages: {} 
        };

        const historyStack = [];
        const STORAGE_KEY = 'sysml_v2_parallel_modelling_state';

        txtImportArea.value = `package CoreSystemArchitecture {\n    part def GroundControlStation;\n    part def UnmannedAerialVehicle;\n    part def NavigationArray;\n    part def PropulsionAssembly;\n}`;

        canvas.addEventListener('click', onCanvasClick);
        btnActionCtx.addEventListener('click', handleContextSwitchAction);
        
        btnTogglePanel.addEventListener('click', () => importPanel.classList.add('collapsed'));
        btnOpenPanel.addEventListener('click', () => importPanel.classList.remove('collapsed'));
        btnCompile.addEventListener('click', compileSysMLV2Text);

        document.addEventListener('mousemove', (e) => handleMoveEvent(e.clientX, e.clientY));
        document.addEventListener('touchmove', (e) => {
            if(isDragging) { e.preventDefault(); const t = e.touches[0]; handleMoveEvent(t.clientX, t.clientY); }
        }, { passive: false });

        document.addEventListener('mouseup', onPointerEnd);
        document.addEventListener('touchend', onPointerEnd);

        btnDelete.addEventListener('click', deleteSelected);
        btnUndo.addEventListener('click', popHistory);
        btnGrow.addEventListener('click', () => resizeBlock(20, 15));
        btnShrink.addEventListener('click', () => resizeBlock(-20, -15));

        window.addEventListener('DOMContentLoaded', loadModel);

        function getActiveLayer() {
            return modelState.currentView === 'DefinitionView' ? modelState.definitions : modelState.usages[modelState.currentView];
        }

        // --- FIXED: Smart Sync Script Parser Engine ---
        function compileSysMLV2Text() {
            const codeText = txtImportArea.value;
            const partDefRegex = /part\s+def\s+([A-Za-z0-9_]+)/g;
            
            let match;
            const extractedNames = [];
            
            while ((match = partDefRegex.exec(codeText)) !== null) {
                if (match[1] && !extractedNames.includes(match[1])) {
                    extractedNames.push(match[1]);
                }
            }

            if (extractedNames.length === 0) {
                alert("No SysML v2 definitions detected. Declare architectural templates using standard syntax: 'part def Name;'");
                return;
            }

            checkpoint();
            modelState.currentView = 'DefinitionView';

            // 1. Prune existing canvas items missing from the new code text
            for (let existingId in modelState.definitions.blocks) {
                const blockName = modelState.definitions.blocks[existingId].text;
                if (!extractedNames.includes(blockName)) {
                    // Purge internal deep mapping states for this definition
                    if (modelState.usages[existingId]) delete modelState.usages[existingId];
                    
                    // Clear structural connections attached to ports of this block
                    const portsToClean = [...modelState.definitions.blocks[existingId].ports];
                    portsToClean.forEach(pId => {
                        for (let cId in modelState.definitions.connections) {
                            if (modelState.definitions.connections[cId].from === pId || modelState.definitions.connections[cId].to === pId) {
                                delete modelState.definitions.connections[cId];
                            }
                        }
                        delete modelState.definitions.ports[pId];
                    });
                    delete modelState.definitions.blocks[existingId];
                }
            }

            // 2. Add elements while keeping position of already existing items intact
            let startX = 60; let startY = 60;
            const horizontalGap = 160; const verticalGap = 110;
            const maxColumns = Math.floor((canvas.clientWidth - startX) / horizontalGap) || 3;

            extractedNames.forEach((name, index) => {
                let existingId = null;
                for (let id in modelState.definitions.blocks) {
                    if (modelState.definitions.blocks[id].text === name) { existingId = id; break; }
                }

                // Spawns uniquely on canvas only if missing from the current system dictionary
                if (!existingId) {
                    const id = 'def_' + modelState.definitions.blockCounter++;
                    const col = index % maxColumns;
                    const row = Math.floor(index / maxColumns);

                    modelState.definitions.blocks[id] = {
                        left: (startX + (col * horizontalGap)) + 'px',
                        top: (startY + (row * verticalGap)) + 'px',
                        width: '130px',
                        height: '80px',
                        text: name,
                        ports: []
                    };
                }
            });

            clearSelection();
            renderActiveView();
            saveModel();
            importPanel.classList.add('collapsed');
        }

        function handleContextSwitchAction() {
            checkpoint();
            if (modelState.currentView === 'DefinitionView') {
                const targetDefId = selectedId;
                if (!modelState.usages[targetDefId]) {
                    modelState.usages[targetDefId] = { blockCounter: 0, portCounter: 0, connCounter: 0, blocks: {}, ports: {}, connections: {} };
                }
                modelState.currentView = targetDefId;
            } else {
                modelState.currentView = 'DefinitionView';
            }
            clearSelection();
            renderActiveView();
            saveModel();
        }

        // --- FIXED: DOM Child Tree Verification Layer ---
        function renderActiveView() {
            // Safe removal check pattern prevents NotFoundError exceptions
            const nodes = canvas.querySelectorAll('.block');
            nodes.forEach(b => {
                if (canvas.contains(b)) canvas.removeChild(b);
            });
            
            svgLayer.innerHTML = '';
            const active = getActiveLayer();

            if (modelState.currentView === 'DefinitionView') {
                diagramCtx.innerText = "DefinitionView: Reusable Blueprints";
                diagramCtx.style.backgroundColor = "var(--accent-def)";
                btnActionCtx.innerText = "Open Usage View (part)";
                btnActionCtx.disabled = true;
            } else {
                const parentDefName = modelState.definitions.blocks[modelState.currentView]?.text || 'Definition';
                diagramCtx.innerText = `UsageView: Structural Assembly of [${parentDefName}]`;
                diagramCtx.style.backgroundColor = "var(--accent-usage)";
                btnActionCtx.innerText = "Back to Definition View";
                btnActionCtx.disabled = false;
            }

            for (let bId in active.blocks) {
                const bData = active.blocks[bId];
                const block = document.createElement('div');
                block.className = 'block';
                block.id = bId;
                block.style.left = bData.left;
                block.style.top = bData.top;
                block.style.width = bData.width || '130px';
                block.style.height = bData.height || '80px';
                
                const label = (modelState.currentView === 'DefinitionView') ? '«part def»' : '«part»';
                block.innerHTML = `<div class="stereotype">${label}</div><div class="text">${bData.text}</div>`;
                
                block.addEventListener('mousedown', (e) => onBlockStart(e, bId, e.clientX, e.clientY));
                block.addEventListener('touchstart', (e) => { const t = e.touches[0]; onBlockStart(e, bId, t.clientX, t.clientY); }, {passive: false});
                block.addEventListener('click', (e) => onBlockClick(e, bId));
                
                canvas.appendChild(block);
                
                bData.ports.forEach(pId => {
                    const pData = active.ports[pId];
                    const port = document.createElement('div');
                    port.className = 'port';
                    port.id = pId;
                    port.style.left = `calc(${pData.pctX}% - 7px)`;
                    port.style.top = `calc(${pData.pctY}% - 7px)`;
                    port.addEventListener('click', (e) => onPortClick(e, pId));
                    block.appendChild(port);
                });
            }

            for (let cId in active.connections) {
                buildConnectionUI(cId, active.connections[cId].from, active.connections[cId].to);
            }
            updateLines();
        }

        function onCanvasClick(e) {
            if (e.target === canvas || e.target === svgLayer) {
                if (selectedId || selectedType) {
                    clearSelection();
                } else {
                    checkpoint();
                    const active = getActiveLayer();
                    const id = 'node_' + active.blockCounter++;
                    
                    const rect = canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left - 65;
                    const y = e.clientY - rect.top - 40;

                    active.blocks[id] = {
                        left: x + 'px', top: y + 'px',
                        width: '130px', height: '80px',
                        text: (modelState.currentView === 'DefinitionView') ? `PartDef_${active.blockCounter}` : `part_${active.blockCounter}`,
                        ports: []
                    };
                    
                    renderActiveView();
                    setSelection('block', id);
                    saveModel();
                }
            }
        }

        function onBlockClick(e, id) {
            e.stopPropagation();
            if (selectedType === 'port') return;

            const blockEl = document.getElementById(id);
            if (!blockEl) return;
            const textEl = blockEl.querySelector('.text');
            const active = getActiveLayer();

            if (selectedId === id && selectedType === 'block') {
                textEl.style.pointerEvents = 'auto';
                textEl.contentEditable = "true";
                textEl.focus();
                document.execCommand('selectAll', false, null);
                
                textEl.addEventListener('blur', () => {
                    if(active.blocks[id].text !== textEl.innerText) {
                        checkpoint();
                        active.blocks[id].text = textEl.innerText;
                    }
                    textEl.contentEditable = "false";
                    textEl.style.pointerEvents = 'none';
                    renderActiveView();
                }, { once: true });
            } else {
                setSelection('block', id);
            }
        }

        function onBlockStart(e, id, clientX, clientY) {
            if (e.target.contentEditable === "true" || e.target.classList.contains('port')) return;
            
            const blockEl = document.getElementById(id);
            if (!blockEl) return;
            const rect = blockEl.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            const borderThresh = 12; 
            const active = getActiveLayer();

            if (x <= borderThresh || x >= rect.width - borderThresh || y <= borderThresh || y >= rect.height - borderThresh) {
                e.stopPropagation();
                e.preventDefault();
                
                const OVERLAP_RADIUS = 16; 
                let matchedPortId = null;

                for (let pId of active.blocks[id].ports) {
                    const portEl = document.getElementById(pId);
                    if (!portEl) continue;
                    const distance = Math.hypot(x - (portEl.offsetLeft + 7), y - (portEl.offsetTop + 7));
                    if (distance <= OVERLAP_RADIUS) { matchedPortId = pId; break; }
                }

                if (matchedPortId) {
                    onPortClick(null, matchedPortId);
                } else {
                    checkpoint();
                    const portId = 'port_' + active.portCounter++;
                    
                    let pctX = 50, pctY = 50, edge = 'top';
                    const minDist = Math.min(x, rect.width - x, y, rect.height - y);
                    if (minDist === x) { pctX = 0; pctY = (y / rect.height) * 100; edge = 'left'; }
                    else if (minDist === (rect.width - x)) { pctX = 100; pctY = (y / rect.height) * 100; edge = 'right'; }
                    else if (minDist === y) { pctX = (x / rect.width) * 100; pctY = 0; edge = 'top'; }
                    else if (minDist === (rect.height - y)) { pctX = (x / rect.width) * 100; pctY = 100; edge = 'bottom'; }

                    active.ports[portId] = { blockId: id, pctX, pctY, edge };
                    active.blocks[id].ports.push(portId);
                    
                    renderActiveView();
                    setSelection('port', portId);
                    saveModel();
                }
                return;
            }

            isDragging = true;
            dragTargetId = id;
            dragStartX = clientX - parseInt(blockEl.style.left);
            dragStartY = clientY - parseInt(blockEl.style.top);
            
            if (selectedType !== 'port' && selectedId !== id) {
                setSelection('block', id);
            }
            e.stopPropagation();
        }

        function onPortClick(e, id) {
            if (e) e.stopPropagation();
            const active = getActiveLayer();
            if (selectedType === 'port' && selectedId !== id) {
                checkpoint();
                const connId = 'conn_' + active.connCounter++;
                active.connections[connId] = { from: selectedId, to: id };
                renderActiveView();
                clearSelection();
                saveModel();
            } else {
                setSelection('port', id);
            }
        }

        function buildConnectionUI(id, fromId, toId) {
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('class', 'connection-wrapper');
            g.setAttribute('id', id);

            const bgLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            bgLine.setAttribute('class', 'connection-bg-line');
            
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            line.setAttribute('class', 'connection-line');

            g.appendChild(bgLine); g.appendChild(line);
            svgLayer.appendChild(g);

            g.addEventListener('click', (e) => { e.stopPropagation(); setSelection('conn', id); });
        }

        function handleMoveEvent(clientX, clientY) {
            if (isDragging && dragTargetId) {
                const blockEl = document.getElementById(dragTargetId);
                if (!blockEl) return;
                const active = getActiveLayer();
                
                const rect = canvas.getBoundingClientRect();
                let currentX = Math.max(0, Math.min(clientX - dragStartX, rect.width - blockEl.offsetWidth));
                let currentY = Math.max(0, Math.min(clientY - dragStartY, rect.height - blockEl.offsetHeight));

                blockEl.style.left = currentX + 'px';
                blockEl.style.top = currentY + 'px';
                
                active.blocks[dragTargetId].left = blockEl.style.left;
                active.blocks[dragTargetId].top = blockEl.style.top;
                updateLines();
            }
        }

        function updateLines() {
            const active = getActiveLayer();
            svgLayer.querySelectorAll('.connection-wrapper').forEach(g => {
                const conn = active.connections[g.id];
                if(!conn) return;

                const getPos = (pId) => {
                    const pData = active.ports[pId];
                    const bEl = document.getElementById(pData.blockId);
                    return {
                        x: parseInt(bEl.style.left) + (bEl.offsetWidth * (pData.pctX / 100)),
                        y: parseInt(bEl.style.top) + (bEl.offsetHeight * (pData.pctY / 100)),
                        edge: pData.edge
                    };
                };

                try {
                    const p1 = getPos(conn.from); const p2 = getPos(conn.to);
                    const getCtrl = (p) => {
                        if (p.edge === 'left') return { x: p.x - 45, y: p.y };
                        if (p.edge === 'right') return { x: p.x + 45, y: p.y };
                        if (p.edge === 'top') return { x: p.x, y: p.y - 45 };
                        return { x: p.x, y: p.y + 45 };
                    };
                    
                    const c1 = getCtrl(p1); const c2 = getCtrl(p2);
                    const d = `M ${p1.x} ${p1.y} C ${c1.x} ${c1.y}, ${c2.x} ${c2.y}, ${p2.x} ${p2.y}`;
                    
                    g.querySelector('.connection-line').setAttribute('d', d);
                    g.querySelector('.connection-bg-line').setAttribute('d', d);
                } catch(err) { /* Catch edge conditions gracefully during mid-render transformations */ }
            });
        }

        function onPointerEnd() { if (isDragging) { isDragging = false; dragTargetId = null; saveModel(); } }

        function setSelection(type, id) {
            clearSelection();
            selectedType = type; selectedId = id;
            const el = document.getElementById(id);
            if (!el) return;
            
            if (type === 'block') {
                el.classList.add('selected');
                btnGrow.disabled = false; btnShrink.disabled = false;
                if(modelState.currentView === 'DefinitionView') btnActionCtx.disabled = false;
            }
            if (type === 'port') el.classList.add('selected');
            if (type === 'conn') document.getElementById(id).classList.add('selected');
            btnDelete.disabled = false;
        }

        function clearSelection() {
            if (selectedType && selectedId) {
                const el = document.getElementById(selectedId);
                if (el) el.classList.remove('selected');
                if (selectedType === 'conn' && document.getElementById(selectedId)) {
                    document.getElementById(selectedId).classList.remove('selected');
                }
            }
            selectedType = null; selectedId = null;
            btnDelete.disabled = true; btnGrow.disabled = true; btnShrink.disabled = true;
            if(modelState.currentView === 'DefinitionView') btnActionCtx.disabled = true;
        }

        function resizeBlock(dw, dh) {
            if (selectedType !== 'block' || !selectedId) return;
            checkpoint();
            const active = getActiveLayer();
            const el = document.getElementById(selectedId);
            if (!el) return;
            
            active.blocks[selectedId].width = Math.max(90, el.offsetWidth + dw) + 'px';
            active.blocks[selectedId].height = Math.max(60, el.offsetHeight + dh) + 'px';
            
            renderActiveView();
            setSelection('block', selectedId);
            saveModel();
        }

        function deleteSelected() {
            if (!selectedType || !selectedId) return;
            checkpoint();
            const active = getActiveLayer();

            if (selectedType === 'block') {
                if (modelState.currentView === 'DefinitionView' && modelState.usages[selectedId]) {
                    delete modelState.usages[selectedId];
                }
                const portsToClean = [...active.blocks[selectedId].ports];
                portsToClean.forEach(pId => {
                    for(let cId in active.connections) {
                        if(active.connections[cId].from === pId || active.connections[cId].to === pId) delete active.connections[cId];
                    }
                    delete active.ports[pId];
                });
                delete active.blocks[selectedId];
            } else if (selectedType === 'port') {
                for(let cId in active.connections) {
                    if(active.connections[cId].from === selectedId || active.connections[cId].to === selectedId) delete active.connections[cId];
                }
                const bId = active.ports[selectedId].blockId;
                active.blocks[bId].ports = active.blocks[bId].ports.filter(p => p !== selectedId);
                delete active.ports[selectedId];
            } else if (selectedType === 'conn') {
                delete active.connections[selectedId];
            }

            clearSelection();
            renderActiveView();
            saveModel();
        }

        function checkpoint() { historyStack.push(JSON.parse(JSON.stringify(modelState))); btnUndo.disabled = false; }
        function saveModel() { localStorage.setItem(STORAGE_KEY, JSON.stringify(modelState)); }
        function loadModel() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) { modelState = JSON.parse(raw); renderActiveView(); }
            btnUndo.disabled = historyStack.length === 0;
        }
        function popHistory() {
            if (historyStack.length === 0) return;
            modelState = historyStack.pop();
            renderActiveView();
            saveModel();
            if (historyStack.length === 0) btnUndo.disabled = true;
        }
    </script>
</body>
</html>
