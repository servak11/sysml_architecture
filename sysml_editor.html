<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SysML v2 Modeler</title>
    <link rel="stylesheet" href="sysml-styles.css">
</head>
<body>

    <div id="app-container">
        <div id="import-panel">
            <div class="panel-header">
                <span>SysML v2 Script Compiler</span>
                <button id="btn-toggle-panel" style="background:transparent; border:none; color:#aaa; cursor:pointer;">◀</button>
            </div>
            <textarea id="txt-import-area"></textarea>
            <div class="panel-footer">
                <button id="btn-compile" class="primary-btn">Sync to System Canvas</button>
            </div>
        </div>

        <div id="workspace">
            <div id="toolbar">
                <button id="btn-open-panel" class="tool-btn" style="font-size:11px; width:auto; padding:0 8px;">📑 Script</button>
                <h1>SysML v2</h1>
                <div id="diagram-context">Structure View: Component Composition</div>
                <div class="view-switcher-group">
                    <button id="btn-view-struct" class="switch-btn active">1. Structure</button>
                    <button id="btn-view-conn" class="switch-btn">2. Connect</button>
                    <button id="btn-view-action" class="switch-btn">3. Action</button>
                </div>
                <button id="btn-undo" class="tool-btn" title="Undo" disabled>↶</button>
                <button id="btn-delete" class="tool-btn" title="Delete" disabled>🗑</button>
            </div>
            <div id="canvas">
                <svg id="svg-layer">
                    <defs>
                        <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                          <path d="M 0 1 L 10 5 L 0 9 z" fill="var(--accent-action)" />
                        </marker>
                        <marker id="diamond-marker" viewBox="0 0 16 16" refX="12" refY="8" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
                          <path d="M 8 2 L 14 8 L 8 14 L 2 8 Z" fill="#fff" stroke="var(--accent-def)" stroke-width="2" />
                        </marker>
                    </defs>
                </svg>
            </div>
        </div>
    </div>

    <script type="module">
        import { modelState, checkpoint, saveModel, loadModel, popHistory, dragInfo } from './sysml-state.js';
        import { compileV2EngineText, executeSelectionDeletion } from './sysml-actions.js';
        import { renderActiveView, clearVisualSelection, updateLines, setVisualSelection } from './sysml-renderer.js';

        const canvas = document.getElementById('canvas');
        const txtImportArea = document.getElementById('txt-import-area');
        
        // Initial configuration values
        txtImportArea.value = `package MissionControl {\n    part def FlightComputer;\n    part def SensorArray;\n    part def TelemetryUnit;\n}`;

        // View Switching Action Logic
        function switchViewMode(mode) {
            checkpoint();
            modelState.currentMode = mode;
            clearVisualSelection();
            renderActiveView();
            saveModel();
        }

        // Initialize UI Event Hook Registers
        document.getElementById('btn-view-struct').addEventListener('click', () => switchViewMode('STRUCTURE'));
        document.getElementById('btn-view-conn').addEventListener('click', () => switchViewMode('CONNECT'));
        document.getElementById('btn-view-action').addEventListener('click', () => switchViewMode('ACTION'));
        
        document.getElementById('btn-compile').addEventListener('click', () => {
            if (compileV2EngineText(txtImportArea.value)) {
                renderActiveView();
                document.getElementById('import-panel').classList.add('collapsed');
            }
        });

        document.getElementById('btn-delete').addEventListener('click', () => {
            if (executeSelectionDeletion()) renderActiveView();
        });

        document.getElementById('btn-undo').addEventListener('click', () => {
            if (popHistory()) renderActiveView();
        });

        document.getElementById('btn-toggle-panel').addEventListener('click', () => document.getElementById('import-panel').classList.add('collapsed'));
        document.getElementById('btn-open-panel').addEventListener('click', () => document.getElementById('import-panel').classList.remove('collapsed'));

        // Handle Canvas Drag and Translation Events
        document.addEventListener('mousemove', (e) => {
            if (dragInfo.isDragging && dragInfo.targetId) {
                const blockEl = document.getElementById(dragInfo.targetId);
                const rect = canvas.getBoundingClientRect();
                let x = Math.max(0, Math.min(e.clientX - dragInfo.startX, rect.width - blockEl.offsetWidth));
                let y = Math.max(0, Math.min(e.clientY - dragInfo.startY, rect.height - blockEl.offsetHeight));
                
                blockEl.style.left = x + 'px'; 
                blockEl.style.top = y + 'px';
                modelState.definitions.blocks[dragInfo.targetId].left = blockEl.style.left;
                modelState.definitions.blocks[dragInfo.targetId].top = blockEl.style.top;
                updateLines();
            }
        });

        document.addEventListener('mouseup', () => {
            if (dragInfo.isDragging) {
                dragInfo.isDragging = false;
                dragInfo.targetId = null;
                saveModel();
            }
        });

        canvas.addEventListener('click', (e) => {
            if (e.target === canvas || e.target.tagName === 'svg') {
                clearVisualSelection();
            }
        });

        // Initialize System Model Layer Application
        window.addEventListener('DOMContentLoaded', () => {
            loadModel();
            renderActiveView();
        });
    </script>
</body>
</html>
